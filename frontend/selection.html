<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Location · Fresh Pantry</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            position: relative;
            background: #1a2a1a;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: url('https://images.unsplash.com/photo-1540420773420-3366772f4999?w=1600') center/cover no-repeat;
            filter: brightness(0.6) blur(3px);
            image-rendering: crisp-edges;
        }

        .opacity-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: rgba(0, 0, 0, 0.2);
            pointer-events: none;
        }

        .smoke-effect {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            background: 
                radial-gradient(circle at 30% 40%, rgba(255, 255, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 70% 60%, rgba(220, 240, 240, 0.18) 0%, transparent 45%),
                radial-gradient(circle at 40% 75%, rgba(210, 230, 220, 0.12) 0%, transparent 50%);
            animation: smokeFloat 20s infinite alternate ease-in-out;
        }
        .smoke-wisps {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" opacity="0.12"><path d="M120,140 Q170,90 220,140 T320,120 Q370,70 350,170 T310,270 Q260,320 210,270 T120,210 Q70,180 120,140" fill="white" stroke="none"><animate attributeName="d" dur="24s" values="M120,140 Q170,90 220,140 T320,120 Q370,70 350,170 T310,270 Q260,320 210,270 T120,210 Q70,180 120,140;M100,110 Q160,60 220,130 T300,90 Q360,50 340,160 T290,280 Q230,340 170,280 T90,190 Q50,140 100,110;M120,140 Q170,90 220,140 T320,120 Q370,70 350,170 T310,270 Q260,320 210,270 T120,210 Q70,180 120,140" repeatCount="indefinite" dur="22s"/></path><path d="M340,290 Q380,250 420,290 T500,270 Q530,230 510,310 T480,400 Q430,450 380,400 T310,350 Q280,310 340,290" fill="white" stroke="none"><animate attributeName="d" dur="26s" values="M340,290 Q380,250 420,290 T500,270 Q530,230 510,310 T480,400 Q430,450 380,400 T310,350 Q280,310 340,290;M320,270 Q370,230 420,280 T490,240 Q530,200 500,300 T460,410 Q410,460 360,410 T290,330 Q250,280 320,270;M340,290 Q380,250 420,290 T500,270 Q530,230 510,310 T480,400 Q430,450 380,400 T310,350 Q280,310 340,290" repeatCount="indefinite" dur="24s"/></path></svg>') repeat;
            background-size: 600px 600px;
            animation: drift 50s linear infinite;
            opacity: 0.25;
        }
        .light-beams {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            background: linear-gradient(125deg, rgba(255,245,200,0.08) 0%, transparent 35%),
                        linear-gradient(215deg, rgba(220,255,220,0.08) 0%, transparent 40%),
                        linear-gradient(45deg, rgba(255,235,180,0.06) 0%, transparent 45%);
            animation: beamMove 18s infinite alternate;
        }
        @keyframes smokeFloat {
            0% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(1.01); }
            100% { opacity: 0.2; transform: scale(0.99); }
        }
        @keyframes drift {
            0% { background-position: 0 0; }
            100% { background-position: 800px 800px; }
        }
        @keyframes beamMove {
            0% { opacity: 0.1; }
            100% { opacity: 0.4; }
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            color: #ffffff;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.8), 0 0 30px rgba(76, 175, 80, 0.5);
            margin-bottom: 2.5rem;
            letter-spacing: 1px;
            background: rgba(20, 35, 20, 0.2);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 15px 40px;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 
                0 0 0 1px rgba(255, 255, 255, 0.3) inset,
                0 15px 30px rgba(0, 0, 0, 0.4),
                20px 20px 40px -20px rgba(0, 0, 0, 0.4),
                -20px -20px 40px -20px rgba(255, 255, 255, 0.2);
            text-align: center;
        }

        .carousel-section {
            position: relative;
            width: 100%;
            max-width: 600px;
            margin: 1rem auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .arrow {
            background: rgba(20, 35, 20, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            font-weight: 300;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s ease;
            box-shadow: 
                0 8px 20px rgba(0,0,0,0.4),
                0 0 0 1px rgba(255, 255, 255, 0.2) inset;
            z-index: 10;
            margin: 0 5px;
            flex-shrink: 0;
        }

        .arrow:hover {
            background: rgba(50, 70, 50, 0.5);
            border-color: white;
            transform: scale(1.08);
            box-shadow: 0 12px 25px rgba(0,0,0,0.5), 0 0 0 2px rgba(255, 255, 255, 0.3) inset;
        }

        .arrow:active {
            transform: scale(0.98);
        }

        .icon-scroll {
            display: flex;
            gap: 0;
            overflow-x: auto;
            scroll-behavior: smooth;
            padding: 2rem 0;
            margin: 0 0.5rem;
            flex: 1;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
            background: transparent;
            scroll-snap-type: x mandatory;
            scroll-padding: 0 calc(50% - 125px);
        }
        .icon-scroll::-webkit-scrollbar {
            display: none;
        }

        .circle-icon {
            flex: 0 0 auto;
            width: 250px;
            height: 250px;
            border-radius: 50%;
            background: rgba(30, 40, 30, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 3px solid rgba(255, 255, 255, 0.3);
            box-shadow: 
                0 20px 30px rgba(0, 0, 0, 0.6),
                0 0 0 2px rgba(255, 255, 255, 0.15) inset,
                0 0 30px rgba(76, 175, 80, 0.3),
                10px 10px 20px -10px rgba(0, 0, 0, 0.5),
                -10px -10px 20px -10px rgba(255, 255, 255, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.8rem;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.3, 1.1);
            position: relative;
            overflow: hidden;
            cursor: pointer;
            scroll-snap-align: center;
            margin: 0 8px;
            transform-origin: center center;
            line-height: 1.2;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .circle-icon span {
            font-size: 5rem;
            margin-bottom: 8px;
            filter: drop-shadow(0 6px 8px rgba(0,0,0,0.6));
            display: block;
            line-height: 1;
        }

        .circle-icon[data-type="home"] { border-bottom: 6px solid #ffaa66; box-shadow: 0 20px 30px rgba(0, 0, 0, 0.6), 0 0 0 2px rgba(255, 255, 255, 0.15) inset, 0 0 30px #ffaa66; }
        .circle-icon[data-type="office"] { border-bottom: 6px solid #66ccff; box-shadow: 0 20px 30px rgba(0, 0, 0, 0.6), 0 0 0 2px rgba(255, 255, 255, 0.15) inset, 0 0 30px #66ccff; }
        .circle-icon[data-type="factory"] { border-bottom: 6px solid #88dd88; box-shadow: 0 20px 30px rgba(0, 0, 0, 0.6), 0 0 0 2px rgba(255, 255, 255, 0.15) inset, 0 0 30px #88dd88; }
        .circle-icon[data-type="custom1"] { border-bottom: 6px solid #b583df; box-shadow: 0 20px 30px rgba(0, 0, 0, 0.6), 0 0 0 2px rgba(255, 255, 255, 0.15) inset, 0 0 30px #b583df; }
        .circle-icon[data-type="custom2"] { border-bottom: 6px solid #f9a8d4; box-shadow: 0 20px 30px rgba(0, 0, 0, 0.6), 0 0 0 2px rgba(255, 255, 255, 0.15) inset, 0 0 30px #f9a8d4; }

        .circle-icon:hover {
            transform: translateY(-8px) scale(1.03);
            background: rgba(55, 75, 55, 0.6);
            border-color: rgba(255, 255, 255, 0.7);
            box-shadow: 
                0 25px 35px rgba(0, 0, 0, 0.7),
                0 0 0 2px rgba(255, 255, 255, 0.25) inset,
                0 0 40px rgba(255, 255, 255, 0.4);
        }

        .circle-icon.add-icon {
            background: rgba(90, 75, 40, 0.5);
            border: 3px dashed rgba(255, 240, 150, 0.9);
            font-weight: 500;
            box-shadow: 
                0 20px 30px rgba(0, 0, 0, 0.6),
                0 0 0 2px rgba(255, 240, 150, 0.2) inset,
                0 0 30px rgba(255, 240, 150, 0.3);
        }
        .circle-icon.add-icon span:last-child { font-size: 1.4rem; margin-top: 5px; }
        .circle-icon.add-icon:hover {
            background: rgba(120, 100, 55, 0.65);
            transform: translateY(-8px) scale(1.03);
            box-shadow: 0 25px 35px rgba(0,0,0,0.7), 0 0 0 3px rgba(255,240,150,0.4) inset, 0 0 40px rgba(255,240,150,0.5);
        }

        .loading-overlay-circle {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: rgba(20, 45, 20, 0.8);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: 0.2s;
            z-index: 10;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5) inset;
        }
        .circle-icon.loading .loading-overlay-circle {
            opacity: 1;
            visibility: visible;
        }
        .food-loader {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 5px;
        }
        .food-item {
            font-size: 2rem;
            animation: bounceFood 1s infinite ease-in-out;
            filter: drop-shadow(0 4px 6px black);
        }
        .food-item:nth-child(1) { animation-delay: 0s; }
        .food-item:nth-child(2) { animation-delay: 0.2s; }
        .food-item:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounceFood {
            0% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-12px) rotate(8deg); }
            100% { transform: translateY(0) rotate(0deg); }
        }

        .context-menu {
            position: absolute;
            background: rgba(30, 40, 30, 0.8);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 30px;
            padding: 0.8rem 0;
            width: 180px;
            display: flex;
            flex-direction: column;
            z-index: 1000;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.2) inset;
            opacity: 0;
            visibility: hidden;
            transition: 0.15s;
            pointer-events: none;
        }
        .context-menu.show {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }
        .context-menu button {
            background: transparent;
            border: none;
            color: white;
            padding: 12px 20px;
            font-size: 1.2rem;
            text-align: left;
            cursor: pointer;
            transition: 0.1s;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
        }
        .context-menu button:hover { background: rgba(80, 120, 80, 0.7); }
        .context-menu button.remove:hover { background: rgba(180, 70, 70, 0.8); }
        .context-menu hr { border: 1px solid rgba(255,255,255,0.1); margin: 5px 0; }

        .popup-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .popup-overlay.show { visibility: visible; opacity: 1; }
        .popup-card {
            background: rgba(30, 45, 30, 0.7);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,240,0.4);
            border-radius: 40px;
            padding: 2rem 2.5rem;
            width: 350px;
            max-width: 90vw;
            color: white;
            box-shadow: 0 30px 50px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.2) inset;
            text-align: center;
        }
        .popup-card h3 {
            font-size: 2rem;
            margin-bottom: 1.5rem;
            font-weight: 400;
            border-bottom: 1px solid rgba(255,255,200,0.3);
            padding-bottom: 0.5rem;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        .popup-card input {
            width: 100%;
            padding: 15px 20px;
            font-size: 1.2rem;
            border-radius: 50px;
            border: none;
            background: rgba(20, 30, 20, 0.6);
            border: 1px solid rgba(255,255,200,0.5);
            color: white;
            outline: none;
            margin-bottom: 1.8rem;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3) inset;
        }
        .popup-card input:focus { box-shadow: 0 5px 20px rgba(0,0,0,0.4) inset, 0 0 0 2px rgba(255,255,200,0.3); }
        .popup-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .popup-btn {
            background: rgba(50, 70, 40, 0.7);
            border: 1px solid rgba(255,255,255,0.3);
            padding: 12px 30px;
            border-radius: 40px;
            font-size: 1.2rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            flex: 1;
        }
        .popup-btn.save { background: rgba(70, 100, 70, 0.8); }
        .popup-btn:hover {
            background: rgba(90, 120, 80, 0.9);
            transform: scale(1.03);
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }

        .fresh-note {
            margin-top: 2.5rem;
            font-size: 1rem;
            color: #ffffff;
            background: rgba(20, 35, 20, 0.3);
            backdrop-filter: blur(5px);
            padding: 8px 30px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 5px 15px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.2) inset;
        }

        @media (max-width: 650px) {
            .circle-icon { width: 200px; height: 200px; font-size: 1.5rem; }
            .circle-icon span { font-size: 4rem; }
            .carousel-section { max-width: 480px; }
            .icon-scroll { scroll-padding: 0 calc(50% - 100px); }
        }
        @media (max-width: 500px) {
            .circle-icon { width: 170px; height: 170px; font-size: 1.3rem; }
            .circle-icon span { font-size: 3.5rem; }
            .carousel-section { max-width: 400px; }
        }
        .warning-toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(180, 70, 30, 0.9); backdrop-filter: blur(8px);
            color: white; padding: 15px 30px; border-radius: 60px;
            font-size: 1.3rem; border: 1px solid #ffaa66; z-index: 300;
            box-shadow: 0 10px 30px black; opacity: 0; transition: 0.2s;
            pointer-events: none; white-space: nowrap;
        }
        .warning-toast.show { opacity: 1; }
    </style>
</head>
<body>
    <div class="opacity-layer"></div>
    <div class="smoke-effect"></div>
    <div class="smoke-wisps"></div>
    <div class="light-beams"></div>

    <h1>🌱 Select Location</h1>

    <div class="context-menu" id="contextMenu">
        <button id="renameOption">✏️ Rename</button>
        <hr>
        <button id="removeOption" class="remove">🗑️ Remove</button>
    </div>

    <div class="carousel-section">
        <div class="arrow" id="leftArrow" style="opacity: 0.3; pointer-events: none;">‹</div>
        <div class="icon-scroll" id="iconScroll">
            <!-- Profiles will be loaded dynamically -->
            <div class="loading-text" style="color: white; text-align: center; width: 100%;">Loading profiles...</div>
        </div>
        <div class="arrow" id="rightArrow">›</div>
    </div>

    <!-- Rename Popup -->
    <div class="popup-overlay" id="renamePopup">
        <div class="popup-card">
            <h3>✏️ rename pantry</h3>
            <input type="text" id="renameInput" placeholder="New name" maxlength="20">
            <div class="popup-buttons">
                <button class="popup-btn" id="cancelRename">cancel</button>
                <button class="popup-btn save" id="saveRename">save</button>
            </div>
        </div>
    </div>

    <!-- Add Popup -->
    <div class="popup-overlay" id="popupOverlay">
        <div class="popup-card">
            <h3>✨ new pantry</h3>
            <input type="text" id="profileNameInput" placeholder="e.g., Warehouse" maxlength="20">
            <div class="popup-buttons">
                <button class="popup-btn" id="cancelPopup">cancel</button>
                <button class="popup-btn save" id="savePopup">save</button>
            </div>
        </div>
    </div>

    <div class="fresh-note">🍏 up to 5 profiles · each to its own dashboard</div>
    <div class="warning-toast" id="warningToast">⚠️ Maximum 5 profiles allowed</div>

    <script>
        const API_BASE = "http://127.0.0.1:5000/api";
        const token = localStorage.getItem("token");
        
        if (!token) {
            alert("Please login first");
            window.location.href = "login.html";
        }

        const scrollContainer = document.getElementById('iconScroll');
        const leftArrow = document.getElementById('leftArrow');
        const rightArrow = document.getElementById('rightArrow');
        const addIcon = document.getElementById('addProfileIcon');
        
        const popupOverlay = document.getElementById('popupOverlay');
        const cancelBtn = document.getElementById('cancelPopup');
        const saveBtn = document.getElementById('savePopup');
        const profileInput = document.getElementById('profileNameInput');
        
        const renamePopup = document.getElementById('renamePopup');
        const renameInput = document.getElementById('renameInput');
        const cancelRename = document.getElementById('cancelRename');
        const saveRename = document.getElementById('saveRename');
        
        const contextMenu = document.getElementById('contextMenu');
        const renameOption = document.getElementById('renameOption');
        const removeOption = document.getElementById('removeOption');
        
        const warningToast = document.getElementById('warningToast');

        let currentTargetIcon = null;
        let profiles = [];

        // Load profiles from backend
        async function loadProfiles() {
            try {
                const response = await fetch(`${API_BASE}/profile/get-profiles`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                if (!response.ok) {
                    throw new Error('Failed to load profiles');
                }
                
                profiles = await response.json();
                renderProfiles();
            } catch (error) {
                console.error('Error loading profiles:', error);
                // Fallback to default profiles
                profiles = [
                    { _id: 'home', profile_name: 'home', display_name: 'Home Pantry' },
                    { _id: 'office', profile_name: 'office', display_name: 'Office Pantry' },
                    { _id: 'factory', profile_name: 'factory', display_name: 'Factory Pantry' },
                    { _id: 'lab', profile_name: 'lab', display_name: 'R&D Kitchen' },
                    { _id: 'test', profile_name: 'test', display_name: 'Test Lab' }
                ];
                renderProfiles();
            }
        }

        // Render profiles
        function renderProfiles() {
            const iconScroll = document.getElementById('iconScroll');
            iconScroll.innerHTML = '';
            
            const emojiMap = {
                'home': '🏠',
                'office': '🏢',
                'factory': '🏭',
                'lab': '🍙',
                'test': '🧆',
                'custom1': '🍙',
                'custom2': '🥨',
                'custom3': '🧀',
                'custom4': '🍉',
                'custom5': '🍒'
            };
            
            profiles.forEach(profile => {
                const profileId = profile.profile_name || profile._id;
                const emoji = emojiMap[profileId] || '📦';
                
                const icon = document.createElement('a');
                icon.href = `dashboard.html?profile=${profileId}`;
                icon.className = 'circle-icon';
                icon.setAttribute('data-type', profileId);
                icon.setAttribute('data-id', profile._id);
                icon.innerHTML = `
                    <span>${emoji}</span>
                    ${profile.display_name || profileId}
                    <div class="loading-overlay-circle">
                        <div class="food-loader">
                            <span class="food-item">✨</span>
                            <span class="food-item">🌟</span>
                            <span class="food-item">💫</span>
                        </div>
                    </div>
                `;
                
                attachEventsToIcon(icon);
                iconScroll.appendChild(icon);
            });
            
            // Add the add icon
            const addIcon = document.createElement('a');
            addIcon.href = '#';
            addIcon.className = 'circle-icon add-icon';
            addIcon.id = 'addProfileIcon';
            addIcon.innerHTML = `
                <span>+</span>
                <span style="font-size: 1.3rem;">Add profile</span>
                <div class="loading-overlay-circle">
                    <div class="food-loader">
                        <span class="food-item">✨</span>
                        <span class="food-item">🌟</span>
                        <span class="food-item">💫</span>
                    </div>
                </div>
            `;
            addIcon.addEventListener('click', handleAddClick);
            iconScroll.appendChild(addIcon);
            
            setTimeout(() => {
                snapToIndex(0);
                setTimeout(updateSizesAndArrows, 300);
            }, 200);
        }

        // Handle profile click
        function handleProfileClick(icon, event) {
            event.preventDefault();
            if (icon.classList.contains('loading')) return;
            
            const dashboardUrl = icon.getAttribute("href");
            
            icon.classList.add('loading');
            icon.style.pointerEvents = 'none';
            
            setTimeout(() => {
                window.location.href = dashboardUrl;
            }, 600);
        }

        // Attach events to icon
        function attachEventsToIcon(icon) {
            icon.addEventListener('click', (e) => handleProfileClick(icon, e));
            icon.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                e.stopPropagation();
                currentTargetIcon = icon;
                
                const menuWidth = 180, menuHeight = 120;
                let left = e.pageX, top = e.pageY;
                if (left + menuWidth > window.innerWidth) left = window.innerWidth - menuWidth - 10;
                if (top + menuHeight > window.innerHeight) top = window.innerHeight - menuHeight - 10;
                
                contextMenu.style.left = left + 'px';
                contextMenu.style.top = top + 'px';
                contextMenu.classList.add('show');
            });
        }

        // Handle add click
        function handleAddClick(e) {
            e.preventDefault();
            if (profiles.length >= 5) {
                warningToast.classList.add('show');
                setTimeout(() => warningToast.classList.remove('show'), 2000);
                return;
            }
            popupOverlay.classList.add('show');
            profileInput.value = '';
            profileInput.focus();
        }

        // Save new profile
        saveBtn.addEventListener('click', async () => {
            if (profiles.length >= 5) {
                warningToast.classList.add('show');
                setTimeout(() => warningToast.classList.remove('show'), 2000);
                hidePopup();
                return;
            }
            
            const newName = profileInput.value.trim();
            if (newName === '') {
                alert('enter a name');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/profile/add-profile`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        profile_name: newName.toLowerCase().replace(/\s+/g, '_'),
                        display_name: newName
                    })
                });
                
                if (response.ok) {
                    hidePopup();
                    await loadProfiles(); // Reload profiles
                } else {
                    const data = await response.json();
                    alert(data.message || 'Failed to add profile');
                }
            } catch (error) {
                console.error('Error adding profile:', error);
                alert('Server error');
            }
        });

        // Rename profile
        saveRename.addEventListener('click', async () => {
            if (!currentTargetIcon) return;
            
            const newName = renameInput.value.trim();
            if (!newName) {
                alert('name cannot be empty');
                return;
            }
            
            const profileId = currentTargetIcon.getAttribute('data-id');
            
            try {
                const response = await fetch(`${API_BASE}/profile/rename-profile/${profileId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ display_name: newName })
                });
                
                if (response.ok) {
                    renamePopup.classList.remove('show');
                    await loadProfiles(); // Reload profiles
                } else {
                    alert('Failed to rename profile');
                }
            } catch (error) {
                console.error('Error renaming profile:', error);
                alert('Server error');
            }
            
            currentTargetIcon = null;
        });

        // Delete profile
        removeOption.addEventListener('click', async () => {
            if (!currentTargetIcon) return;
            
            if (profiles.length <= 1) {
                alert('At least one profile must remain');
                contextMenu.classList.remove('show');
                currentTargetIcon = null;
                return;
            }
            
            if (!confirm('Are you sure you want to delete this profile?')) {
                contextMenu.classList.remove('show');
                currentTargetIcon = null;
                return;
            }
            
            const profileId = currentTargetIcon.getAttribute('data-id');
            
            try {
                const response = await fetch(`${API_BASE}/profile/delete-profile/${profileId}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                if (response.ok) {
                    contextMenu.classList.remove('show');
                    await loadProfiles(); // Reload profiles
                } else {
                    alert('Failed to delete profile');
                }
            } catch (error) {
                console.error('Error deleting profile:', error);
                alert('Server error');
            }
            
            currentTargetIcon = null;
        });

        // Hide popup functions
        function hidePopup() { popupOverlay.classList.remove('show'); }
        cancelBtn.addEventListener('click', hidePopup);
        popupOverlay.addEventListener('click', (e) => { if (e.target === popupOverlay) hidePopup(); });

        cancelRename.addEventListener('click', () => renamePopup.classList.remove('show'));
        renamePopup.addEventListener('click', (e) => { if (e.target === renamePopup) renamePopup.classList.remove('show'); });

        // Hide context menu
        document.addEventListener('click', (e) => { if (!contextMenu.contains(e.target)) contextMenu.classList.remove('show'); });
        scrollContainer.addEventListener('scroll', () => contextMenu.classList.remove('show'));

        // Carousel functions
        function updateSizesAndArrows() {
            const icons = document.querySelectorAll('.circle-icon');
            if (!icons.length) return;
            
            const container = scrollContainer;
            const containerCenter = container.scrollLeft + container.clientWidth / 2;
            
            icons.forEach(icon => {
                icon.style.transform = 'scale(1)';
                icon.style.opacity = '0.9';
                icon.style.filter = 'blur(0px)';
                icon.style.zIndex = '1';
            });
            
            let minDist = Infinity, centerIdx = 0;
            icons.forEach((icon, i) => {
                const iconCenter = icon.offsetLeft + icon.offsetWidth / 2;
                const dist = Math.abs(iconCenter - containerCenter);
                if (dist < minDist) { minDist = dist; centerIdx = i; }
            });
            
            icons.forEach((icon, i) => {
                const iconCenter = icon.offsetLeft + icon.offsetWidth / 2;
                const dist = Math.abs(iconCenter - containerCenter);
                let scale = 1, opacity = 0.9, blur = 0;
                
                if (i === centerIdx) {
                    scale = 1.25;
                    opacity = 1;
                    blur = 0;
                    icon.style.zIndex = '10';
                } else {
                    const distFactor = Math.min(dist / 250, 1.3);
                    scale = 0.8 - (distFactor * 0.15);
                    if (scale < 0.55) scale = 0.55;
                    opacity = 0.8 - (distFactor * 0.3);
                    if (opacity < 0.4) opacity = 0.4;
                    blur = distFactor * 0.8;
                    icon.style.zIndex = '1';
                }
                
                icon.style.transform = `scale(${scale})`;
                icon.style.opacity = opacity;
                icon.style.filter = `blur(${blur}px)`;
            });
            
            leftArrow.style.opacity = centerIdx === 0 ? '0.3' : '1';
            leftArrow.style.pointerEvents = centerIdx === 0 ? 'none' : 'auto';
            rightArrow.style.opacity = centerIdx === icons.length-1 ? '0.3' : '1';
            rightArrow.style.pointerEvents = centerIdx === icons.length-1 ? 'none' : 'auto';
        }

        function snapToIndex(index) {
            const icons = document.querySelectorAll('.circle-icon');
            if (index < 0 || index >= icons.length) return;
            
            const target = icons[index];
            const container = scrollContainer;
            const scrollLeft = target.offsetLeft - (container.clientWidth / 2) + (target.offsetWidth / 2);
            container.scrollTo({ left: scrollLeft, behavior: 'smooth' });
        }

        function getCenterIndex() {
            const icons = document.querySelectorAll('.circle-icon');
            if (!icons.length) return 0;
            
            const container = scrollContainer;
            const containerCenter = container.scrollLeft + container.clientWidth / 2;
            let minDist = Infinity, idx = 0;
            
            icons.forEach((icon, i) => {
                const c = icon.offsetLeft + icon.offsetWidth / 2;
                const d = Math.abs(c - containerCenter);
                if (d < minDist) { minDist = d; idx = i; }
            });
            
            return idx;
        }

        leftArrow.addEventListener('click', () => { const idx = getCenterIndex(); if (idx > 0) snapToIndex(idx-1); });
        rightArrow.addEventListener('click', () => { const idx = getCenterIndex(); const icons = document.querySelectorAll('.circle-icon'); if (idx < icons.length-1) snapToIndex(idx+1); });

        let ticking = false;
        scrollContainer.addEventListener('scroll', () => {
            if (!ticking) {
                window.requestAnimationFrame(() => { updateSizesAndArrows(); ticking = false; });
                ticking = true;
            }
        });

        window.addEventListener('resize', updateSizesAndArrows);

        // Load profiles on page load
        document.addEventListener('DOMContentLoaded', loadProfiles);
    </script>
</body>
</html>
