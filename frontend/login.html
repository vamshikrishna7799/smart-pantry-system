<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pantry login · fresh & cooked</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin: 0;
            background-image: url('https://images.unsplash.com/photo-1510629954389-c1e0da47d414?w=1600&auto=format&fit=crop&q=80');
            background-size: cover;
            background-position: center 30%;
            background-repeat: no-repeat;
            background-attachment: fixed;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: inherit;
            background-image: inherit;
            background-size: inherit;
            background-position: inherit;
            background-repeat: inherit;
            background-attachment: inherit;
            filter: brightness(0.6) blur(3px);
            pointer-events: none;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px) saturate(180%);
            -webkit-backdrop-filter: blur(10px) saturate(180%);
            border-radius: 32px;
            padding: 2.5rem 2.2rem;
            width: 380px;
            box-shadow: 
                0 0 0 1px rgba(255, 255, 255, 0.3),
                0 30px 50px -20px rgba(0, 0, 0, 0.5),
                0 0 0 2px rgba(255, 245, 225, 0.2) inset,
                20px 20px 40px -20px rgba(0, 0, 0, 0.4),
                -20px -20px 40px -20px rgba(255, 255, 255, 0.2);
            text-align: center;
            border: 1px solid rgba(255,255,255,0.4);
            transition: transform 0.2s ease;
            z-index: 10;
            position: relative;
        }

        .glass-panel:hover {
            transform: scale(1.01);
        }

        h2 {
            font-size: 2.2rem;
            font-weight: 500;
            color: white;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            letter-spacing: 1px;
            margin-bottom: 1.5rem;
        }

        input {
            width: 100%;
            padding: 14px 18px;
            margin: 10px 0;
            border: none;
            border-radius: 60px;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1), 0 1px 2px rgba(255,255,255,0.3) inset;
            color: white;
            font-size: 1rem;
            font-weight: 400;
            outline: none;
            transition: all 0.2s;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.8);
            font-weight: 300;
            text-shadow: 0 1px 4px rgba(0,0,0,0.2);
        }

        input:focus {
            background: rgba(255, 255, 255, 0.35);
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.2), 0 0 0 2px rgba(255, 255, 255, 0.3);
        }

        button {
            width: 100%;
            padding: 14px 18px;
            margin: 20px 0 10px;
            border: none;
            border-radius: 60px;
            background: rgba(43, 110, 79, 0.8);
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.25);
            transition: 0.15s;
            border: 1px solid rgba(255,255,255,0.3);
            backdrop-filter: blur(4px);
        }

        button:hover {
            background: rgba(31, 138, 92, 0.9);
            transform: scale(1.02);
            box-shadow: 0 12px 22px rgba(0, 0, 0, 0.35);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .forgot-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 4px;
            margin-bottom: 6px;
        }

        .forgot-link {
            color: white;
            font-size: 0.9rem;
            font-weight: 500;
            text-shadow: 0 2px 6px rgba(0,0,0,0.4);
            text-decoration: none;
            border-bottom: 1px dotted rgba(255,255,255,0.7);
            padding-bottom: 2px;
            transition: border 0.2s;
            cursor: pointer;
        }

        .forgot-link:hover {
            border-bottom: 1px solid white;
        }

        .error-message {
            background: rgba(255, 68, 68, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 60px;
            padding: 10px 15px;
            margin: 10px 0;
            color: white;
            font-weight: 500;
            backdrop-filter: blur(4px);
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
            display: none;
        }
        
        .error-message.show {
            display: block;
        }

        .food-pop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            overflow: hidden;
        }

        .food-item {
            position: absolute;
            font-size: 2.5rem;
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.3));
            animation: popAnimation 2s ease-out forwards;
            z-index: 10000;
            white-space: nowrap;
        }

        @keyframes popAnimation {
            0% {
                opacity: 0;
                transform: translateY(0) scale(0.3) rotate(0deg);
            }
            15% {
                opacity: 1;
                transform: translateY(-30px) scale(1.3) rotate(12deg);
            }
            40% {
                opacity: 1;
                transform: translateY(-80px) scale(1.2) rotate(-8deg);
            }
            70% {
                opacity: 0.9;
                transform: translateY(-150px) scale(1.0) rotate(5deg);
            }
            100% {
                opacity: 0;
                transform: translateY(-220px) scale(0.6) rotate(-20deg);
            }
        }

        .food-item.slow {
            animation: popAnimation 2.3s ease-out forwards;
        }
        .food-item.fast {
            animation: popAnimation 1.7s ease-out forwards;
        }
        
        .page-transition {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #efe3d2;
            z-index: 10000;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        
        .page-transition.active {
            opacity: 1;
            pointer-events: all;
        }

        .register-link {
            margin-top: 15px;
        }

        .register-link a {
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            border-bottom: 1px dotted rgba(255,255,255,0.5);
        }
    </style>
</head>
<body>
    <div class="page-transition" id="transitionOverlay"></div>
    <div class="food-pop" id="foodPopContainer"></div>

    <div class="glass-panel">
        <h2>🥗 Smart Pantry</h2>
        <form id="loginForm" onsubmit="event.preventDefault(); loginUser();">
            <input type="text" id="username" name="username" placeholder="👤 username" required autocomplete="username">
            <input type="password" id="password" name="password" placeholder="🔒 password" required autocomplete="current-password">
            
            <div class="error-message" id="errorMessage"></div>
            
            <div class="forgot-row">
                <a class="forgot-link" href="#" id="forgotPasswordLink">Forgot password?</a>
                <a class="forgot-link" href="forgotusername.html" id="forgotUsernameLink">Forgot username?</a>
            </div>

            <button type="submit" id="loginBtn">Login</button>
        </form>
        <div class="register-link">
            <a href="register.html">Don't have an account? Register here</a>
        </div>
    </div>

<script>
const API_BASE = "https://smart-pantry-system-production.up.railway.app/api";

async function loginUser() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;
    const errorMsg = document.getElementById('errorMessage');
    const loginBtn = document.getElementById('loginBtn');
    const transitionOverlay = document.getElementById('transitionOverlay');

    if (!username || !password) {
        errorMsg.textContent = 'Please enter both username and password';
        errorMsg.classList.add('show');
        setTimeout(() => errorMsg.classList.remove('show'), 3000);
        return;
    }

    loginBtn.disabled = true;
    loginBtn.textContent = 'Logging in...';

    try {
        const response = await fetch(`${API_BASE}/user/login`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Accept": "application/json"
            },
            mode: 'cors',
            body: JSON.stringify({
                username: username,
                password: password
            })
        });

        const data = await response.json();

        if (response.status === 200) {
            localStorage.setItem("token", data.token);
            localStorage.setItem("user_id", data.user_id);
            localStorage.setItem("username", data.username);
            localStorage.setItem("userEmail", data.email);
            
            errorMsg.textContent = '✅ Login successful! Redirecting...';
            errorMsg.classList.add('show', 'success');
            errorMsg.style.background = 'rgba(76, 175, 80, 0.3)';
            
            for (let i = 0; i < 8; i++) {
                setTimeout(() => createFoodPop(), i * 100);
            }
            
            transitionOverlay.classList.add('active');
            
            setTimeout(() => {
                window.location.href = "selection.html";
            }, 1500);
        } else {
            errorMsg.textContent = data.message || 'Login failed';
            errorMsg.classList.add('show');
            errorMsg.style.background = 'rgba(255, 68, 68, 0.3)';
            setTimeout(() => errorMsg.classList.remove('show'), 3000);
            
            loginBtn.disabled = false;
            loginBtn.textContent = 'Login';
        }
    } catch (error) {
        console.error('Login error:', error);
        errorMsg.textContent = 'Network error: Could not connect to server.';
        errorMsg.classList.add('show');
        errorMsg.style.background = 'rgba(255, 68, 68, 0.3)';
        setTimeout(() => errorMsg.classList.remove('show'), 4000);
        
        loginBtn.disabled = false;
        loginBtn.textContent = 'Login';
    }
}

document.getElementById('forgotPasswordLink').addEventListener('click', function(e) {
    e.preventDefault();
    const overlay = document.getElementById('transitionOverlay');
    overlay.classList.add('active');
    setTimeout(() => {
        window.location.href = 'forgotpassword.html';
    }, 400);
});

function createFoodPop() {
    const container = document.getElementById('foodPopContainer');
    if (!container) return;
    
    const foodItems = ['🥕', '🥦', '🍅', '🥬', '🍎', '🍇', '🍉', '🍒', '🥝', '🍞', '🧀', '🍕'];
    const item = document.createElement('div');
    item.className = 'food-item ' + (Math.random() > 0.5 ? 'slow' : 'fast');
    item.textContent = foodItems[Math.floor(Math.random() * foodItems.length)];
    
    const left = 10 + Math.random() * 80;
    item.style.left = left + '%';
    const top = 70 + Math.random() * 25;
    item.style.top = top + '%';
    item.style.transform = `rotate(${Math.random() * 30 - 15}deg)`;
    
    container.appendChild(item);
    
    setTimeout(() => {
        if (item.parentNode) item.remove();
    }, 2500);
}

document.getElementById('loginForm').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        e.preventDefault();
        loginUser();
    }
});

window.addEventListener('load', function() {
    const token = localStorage.getItem('token');
});
</script>
</body>
</html>
