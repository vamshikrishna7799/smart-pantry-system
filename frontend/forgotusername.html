<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recover Username · Smart Pantry</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 2rem;
            position: relative;
            background: #0a0c0b;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: url('https://images.unsplash.com/photo-1542838132-92c53300491e?w=1600') center/cover no-repeat;
            filter: brightness(0.8) contrast(1.1);
        }

        .food-overlay-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: url('https://images.unsplash.com/photo-1542838132-92c53300491e?w=1600') center/cover no-repeat;
            opacity: 0.4;
            mix-blend-mode: overlay;
            pointer-events: none;
        }

        .smoke-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            background: radial-gradient(circle at 20% 30%, rgba(255,255,255,0.15) 0%, transparent 35%),
                        radial-gradient(circle at 90% 60%, rgba(220,240,255,0.18) 0%, transparent 40%);
            animation: smokeFloat 20s infinite alternate ease-in-out;
        }

        @keyframes smokeFloat {
            0% { opacity: 0.3; transform: scale(1); }
            100% { opacity: 0.6; transform: scale(1.03); }
        }

        .recover-panel {
            width: 450px;
            max-width: 92%;
            background: rgba(20, 28, 22, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 36px;
            padding: 2rem 1.8rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(160, 220, 170, 0.3) inset;
            border: 1px solid rgba(100, 200, 120, 0.25);
        }

        h2 {
            font-size: 2rem;
            font-weight: 600;
            color: #e0ffe0;
            border-left: 6px solid #9bc89b;
            padding-left: 1rem;
            margin-bottom: 1.8rem;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.8);
        }

        .input-group {
            margin-bottom: 1.2rem;
        }

        .input-group label {
            display: block;
            text-align: left;
            font-weight: 600;
            color: #d8ffd8;
            margin-bottom: 0.4rem;
            margin-left: 0.5rem;
            font-size: 1rem;
            text-shadow: 0 2px 5px rgba(0,0,0,0.7);
        }

        input, button {
            width: 100%;
            padding: 15px 20px;
            border-radius: 50px;
            border: 1px solid rgba(90, 170, 90, 0.6);
            background: rgba(30, 40, 30, 0.85);
            color: #f0fff0;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        input:focus {
            border-color: #b8e6b8;
            background: rgba(40, 55, 40, 0.9);
            box-shadow: 0 8px 22px rgba(50, 150, 50, 0.3);
        }

        button {
            background: #2d5a2d;
            font-weight: bold;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            margin-top: 0.8rem;
            border: 1px solid #6ca56c;
            transition: 0.15s;
        }

        button:hover {
            background: #3f6f3f;
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .food-loading {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-left: 6px;
        }

        .food-icon {
            font-size: 1.6rem;
            animation: floatFood 1.2s infinite ease-in-out;
        }

        @keyframes floatFood {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        .hidden {
            display: none !important;
        }

        .message {
            padding: 12px;
            border-radius: 50px;
            margin-top: 1rem;
            text-align: center;
            font-weight: 500;
        }

        .message.error {
            background: rgba(255, 68, 68, 0.3);
            color: #ff9f9f;
            border: 1px solid rgba(255, 100, 100, 0.5);
        }

        .message.success {
            background: rgba(76, 175, 80, 0.3);
            color: #9fff9f;
            border: 1px solid rgba(100, 255, 100, 0.5);
        }

        .message.info {
            background: rgba(52, 152, 219, 0.3);
            color: #9fddff;
            border: 1px solid rgba(100, 200, 255, 0.5);
        }

        .back-link {
            display: inline-block;
            margin-top: 1.5rem;
            color: #d0f0d0;
            text-decoration: none;
            background: rgba(20, 45, 20, 0.7);
            border-radius: 40px;
            padding: 10px 28px;
            border: 1px solid #5f9f5f;
            transition: 0.15s;
            text-align: center;
        }

        .back-link:hover {
            background: #3f6f3f;
            color: white;
        }

        .username-result {
            background: rgba(30, 50, 30, 0.8);
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid #6ca56c;
        }

        .username-result h3 {
            color: #9bc89b;
            margin-bottom: 15px;
        }

        .username-display {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffaa66;
            text-align: center;
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 50px;
            margin: 10px 0;
            word-break: break-all;
        }

        .info-note {
            margin-top: 1rem;
            font-size: 0.9rem;
            color: #d4f0d4;
            background: rgba(10, 30, 10, 0.7);
            padding: 8px 22px;
            border-radius: 100px;
            backdrop-filter: blur(4px);
            border: 1px solid #488848;
        }

        hr {
            border: none;
            height: 1px;
            background: linear-gradient(to right, transparent, #7cb37c, transparent);
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="food-overlay-bg"></div>
    <div class="smoke-overlay"></div>

    <div class="recover-panel">
        <h2>👤 Forgot Username</h2>

        <div id="emailStep">
            <div class="input-group">
                <label>📧 Registered Email</label>
                <input type="email" id="emailInput" placeholder="your@email.com" required>
                <button id="checkEmailBtn">
                    <span class="button-text">Check Email</span>
                    <span class="food-loading hidden" id="checkLoading">
                        <span class="food-icon">🔍</span>
                        <span class="food-icon">📧</span>
                        <span class="food-icon">✨</span>
                    </span>
                </button>
            </div>
            <div id="emailMessage" class="message" style="display: none;"></div>
        </div>

        <div id="usernameResult" style="display: none;">
            <div class="username-result">
                <h3>✅ Your Username Found!</h3>
                <div class="username-display" id="existingUsername"></div>
                <p style="color: #aaccaa; text-align: center; margin-top: 10px;">
                    Use this username to login to your Smart Pantry.
                </p>
            </div>
            <hr>
            <div class="input-group">
                <label>✏️ Or Create New Username</label>
                <input type="text" id="newUsernameInput" placeholder="Enter new username" maxlength="30">
                <button id="updateUsernameBtn">
                    <span class="button-text">Update Username</span>
                    <span class="food-loading hidden" id="updateUsernameLoading">
                        <span class="food-icon">🔄</span>
                        <span class="food-icon">✏️</span>
                        <span class="food-icon">✅</span>
                    </span>
                </button>
            </div>
            <div id="usernameMessage" class="message" style="display: none;"></div>
        </div>

        <a href="login.html" class="back-link" style="display: inline-block; margin-top: 1.5rem;">← Back to Login</a>
    </div>

    <div class="info-note">
        <span>🔍 Enter your registered email to recover your username or create a new one!</span>
    </div>

    <script>
        const API_BASE = "http://127.0.0.1:5000/api";
        let currentEmail = "";

        const emailInput = document.getElementById('emailInput');
        const checkEmailBtn = document.getElementById('checkEmailBtn');
        const checkLoading = document.getElementById('checkLoading');
        const emailMessage = document.getElementById('emailMessage');
        const emailStep = document.getElementById('emailStep');
        const usernameResultDiv = document.getElementById('usernameResult');
        const existingUsernameSpan = document.getElementById('existingUsername');
        const newUsernameInput = document.getElementById('newUsernameInput');
        const updateUsernameBtn = document.getElementById('updateUsernameBtn');
        const updateUsernameLoading = document.getElementById('updateUsernameLoading');
        const usernameMessage = document.getElementById('usernameMessage');

        function showMessage(element, message, type) {
            element.textContent = message;
            element.className = `message ${type}`;
            element.style.display = 'block';
            setTimeout(() => {
                element.style.display = 'none';
            }, 5000);
        }

        function simulateLoading(button, loaderSpan, callback) {
            const textSpan = button.querySelector('.button-text');
            if (textSpan) textSpan.style.opacity = '0.4';
            loaderSpan.classList.remove('hidden');
            button.disabled = true;

            setTimeout(() => {
                loaderSpan.classList.add('hidden');
                if (textSpan) textSpan.style.opacity = '1';
                button.disabled = false;
                if (callback) callback();
            }, 1000);
        }

        checkEmailBtn.addEventListener('click', async (e) => {
            e.preventDefault();

            const email = emailInput.value.trim();
            if (!email) {
                showMessage(emailMessage, 'Please enter your email address', 'error');
                return;
            }

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showMessage(emailMessage, 'Please enter a valid email address', 'error');
                return;
            }

            currentEmail = email;

            try {
                const response = await fetch(`${API_BASE}/user/recover-username`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ email: email })
                });

                const data = await response.json();

                simulateLoading(checkEmailBtn, checkLoading, () => {
                    if (response.ok && data.username) {
                        existingUsernameSpan.textContent = data.username;
                        emailStep.style.display = 'none';
                        usernameResultDiv.style.display = 'block';
                        showMessage(usernameMessage, 'Email verified! You can use your existing username or create a new one.', 'success');
                    } else {
                        showMessage(emailMessage, data.message || 'Email not registered', 'error');
                    }
                });

            } catch (error) {
                console.error('Check email error:', error);
                showMessage(emailMessage, 'Server error. Please try again later.', 'error');
            }
        });

        updateUsernameBtn.addEventListener('click', async (e) => {
            e.preventDefault();

            const newUsername = newUsernameInput.value.trim();
            if (!newUsername) {
                showMessage(usernameMessage, 'Please enter a new username', 'error');
                return;
            }

            if (newUsername.length < 3) {
                showMessage(usernameMessage, 'Username must be at least 3 characters', 'error');
                return;
            }

            if (newUsername.length > 30) {
                showMessage(usernameMessage, 'Username must be less than 30 characters', 'error');
                return;
            }

            if (!/^[a-zA-Z0-9_]+$/.test(newUsername)) {
                showMessage(usernameMessage, 'Username can only contain letters, numbers, and underscores', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/user/update-username`, {
                    method: "PUT",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        email: currentEmail,
                        new_username: newUsername
                    })
                });

                const data = await response.json();

                simulateLoading(updateUsernameBtn, updateUsernameLoading, () => {
                    if (response.ok) {
                        showMessage(usernameMessage, '✅ Username updated successfully! Redirecting to login...', 'success');
                        setTimeout(() => {
                            window.location.href = 'login.html';
                        }, 2000);
                    } else {
                        showMessage(usernameMessage, data.message || 'Failed to update username', 'error');
                    }
                });

            } catch (error) {
                console.error('Update username error:', error);
                showMessage(usernameMessage, 'Server error. Please try again.', 'error');
            }
        });
    </script>
</body>
</html>
