<!DOCTYPE html>
<html>
<head>
    <style>
        body { 
            text-align: center; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        body::before {
            content: ""; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: -1;
            background: url('https://images.unsplash.com/photo-1542838132-92c53300491e?w=1600') center/cover;
            filter: brightness(0.6) blur(3px);
        }
        /* Optional overlay to ensure text readability */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: -1;
        }
        .card { 
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            display: inline-block; 
            padding: 60px 100px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        h1 {
            font-size: 4rem;
            margin-bottom: 40px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            font-weight: 600;
            letter-spacing: 2px;
        }
        .btn { 
            padding: 20px 50px; 
            background: transparent;
            color: white; 
            border-radius: 50px; 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 1.8rem;
            display: inline-block;
            border: 2px solid white;
            cursor: pointer;
            transition: all 0.3s ease;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
            letter-spacing: 1px;
        }
        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
            border-color: #27ae60;
            color: #27ae60;
        }
        
        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        
        .loading-overlay.active {
            display: flex;
            opacity: 1;
        }
        
        .loading-content {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 50px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .loading-food {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 600px;
            margin-bottom: 40px;
        }
        
        .loading-food-item {
            font-size: 5rem;
            animation: popIn 0.5s ease forwards;
            opacity: 0;
            transform: scale(0);
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.5));
        }
        
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0); }
            70% { transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }
        
        .loading-text {
            font-size: 2.2rem;
            color: white;
            font-weight: bold;
            animation: pulse 1.5s ease infinite;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            letter-spacing: 2px;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        /* Animation delays for food items */
        .food-loading-1 { animation-delay: 0s; }
        .food-loading-2 { animation-delay: 0.2s; }
        .food-loading-3 { animation-delay: 0.4s; }
        .food-loading-4 { animation-delay: 0.6s; }
        .food-loading-5 { animation-delay: 0.8s; }
        .food-loading-6 { animation-delay: 1.0s; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Smart Pantry</h1>
        <button onclick="showLoading()" class="btn">Entry Pantry</button>
    </div>
    
    <!-- Loading overlay with simplified food items -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-content">
            <div class="loading-food">
                
                <!-- Meat -->
                <span class="loading-food-item food-loading-3">🥩</span>
                
                <!-- Egg -->
                <span class="loading-food-item food-loading-4">🥚</span>
                
                <!-- Fruit (Apple) -->
                <span class="loading-food-item food-loading-5">🍎</span>
                
                <!-- Milk -->
                <span class="loading-food-item food-loading-6">🥛</span>
            </div>
            <div class="loading-text">Loading your pantry...</div>
        </div>
    </div>
    
    <script>
        function showLoading() {
            const loadingOverlay = document.getElementById('loadingOverlay');
            loadingOverlay.classList.add('active');
            
            setTimeout(function() {
                window.location.href = 'register.html';
            }, 2000);
        }
    </script>
</body>
</html>
