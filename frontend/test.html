<!DOCTYPE html>
<html>
<head>
    <title>API Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-width: 500px;
            width: 90%;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: scale(1.05);
        }
        #result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔌 API Connection Test</h1>
        <button onclick="testConnection()">Test Backend Connection</button>
        <div id="result"></div>
        <p style="margin-top: 20px; font-size: 12px; color: #666;">
            Testing connection to: <strong>smart-pantry-api-wptw.onrender.com</strong>
        </p>
    </div>

    <script>
        async function testConnection() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '⏳ Testing connection...';
            resultDiv.className = '';
            
            try {
                const response = await fetch('https://smart-pantry-api-wptw.onrender.com/api/health');
                const data = await response.json();
                resultDiv.innerHTML = '✅ Connected successfully!<br>Response: ' + JSON.stringify(data);
                resultDiv.className = 'success';
            } catch (error) {
                resultDiv.innerHTML = '❌ Failed to connect:<br>' + error.message;
                resultDiv.className = 'error';
            }
        }
    </script>
</body>
</html>
